<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src ws://localhost:8000 http://localhost:8000; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Computer-Use Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">Notive</h1>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <main class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Messages will be dynamically added here -->
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h2>Welcome to Notive</h2>
                    <p>I can control a computer to help you with various tasks. Try asking me to:</p>
                    <ul>
                        <li>Open a browser and search for something</li>
                        <li>Create and edit files</li>
                        <li>Navigate the file system</li>
                        <li>Run terminal commands</li>
                    </ul>
                </div>
            </div>
        </main>

        <!-- Downloads Section (appears when files are created) -->
        <div class="downloads-section" id="downloadsSection" style="display: none;">
            <div class="downloads-header">
                <span>📁 Available Downloads</span>
                <button class="clear-downloads-btn" id="clearDownloads" title="Clear downloads">✕</button>
            </div>
            <div class="downloads-list" id="downloadsList">
                <!-- Download links will be dynamically added here -->
            </div>
        </div>

        <!-- Input Container -->
        <footer class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Type your instruction for the agent..." rows="1"
                    disabled></textarea>
                <button id="sendButton" class="send-button" disabled>
                    <span class="send-icon">➤</span>
                </button>
            </div>
            <div class="input-hint" id="inputHint">
                Connecting to agent...
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
